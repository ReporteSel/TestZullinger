<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test de Zulliger</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-family: Georgia, serif;
  }

  /* PDF ocupa todo */
  iframe {
    flex: 1;
    width: 100%;
    border: none;
    display: block;
  }

  /* Barra inferior mínima */
  nav {
    height: 52px;
    background: #0a0a0a;
    border-top: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    flex-shrink: 0;
  }

  button {
    padding: 0.5rem 2.2rem;
    font-family: Georgia, serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    background: transparent;
    color: #666;
    border: 1px solid #333;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:hover {
    color: #fff;
    border-color: #666;
  }

  button.active {
    background: #fff;
    color: #000;
    border-color: #fff;
    font-weight: bold;
  }
</style>
</head>
<body>

<iframe id="visor" src="lamina1.pdf"></iframe>

<nav>
  <button class="active" onclick="ir(1, this)">Lámina I</button>
  <button onclick="ir(2, this)">Lámina II</button>
  <button onclick="ir(3, this)">Lámina III</button>
</nav>

<script>
  function ir(n, btn) {
    document.getElementById('visor').src = 'lamina' + n + '.pdf';
    document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
</script>

</body>
</html>
